# Path → label rules for actions/labeler@v6 (PR file paths).

"area/protocol":
  - changed-files:
      - any-glob-to-any-file:
          - protocol.go

"area/transport":
  - changed-files:
      - any-glob-to-any-file:
          - transport.go

"area/server":
  - changed-files:
      - any-glob-to-any-file:
          - server.go

"area/pidfile":
  - changed-files:
      - any-glob-to-any-file:
          - pidfile_unix.go
          - pidfile_windows.go

"area/signals":
  - changed-files:
      - any-glob-to-any-file:
          - signals.go
          - signals_windows.go

"area/socket":
  - changed-files:
      - any-glob-to-any-file:
          - socket.go

"area/docs":
  - changed-files:
      - any-glob-to-any-file:
          - docs/**
          - README.md
          - "**/*.md"

"area/ci":
  - changed-files:
      - any-glob-to-any-file:
          - .goreleaser*.yml
          - .golangci.yml

"ci":
  - changed-files:
      - any-glob-to-any-file:
          - .github/workflows/**
          - .github/labeler-config.yml
          - .github/labeler-config-pr.yml
          - .github/labels.yml
          - .github/pr-paths.yml
          - .github/release.yml

"dependencies":
  - changed-files:
      - any-glob-to-any-file:
          - go.mod
          - go.sum
          - docs/package.json
          - docs/package-lock.json
