# Keyword regex labels for issues. PRs use labeler-config-pr.yml + pr-paths.yml.

"bug": '\b([Bb]ug(s)?|[Ff]ix(es)?)\b'

"enhancement": '\b([Ff]eat(s)?)\b'

"documentation": '\b([Dd]ocumentation|[Dd]ocs|[Rr]eadme)\b'

"question": '\b([Qq]uestion(s)?|[Hh]elp|[Hh]ow to)\b'

"performance": '\b([Pp]erformance|[Oo]ptimiz(e|ation)|[Ss]peed|[Tt]hroughput|[Ll]atency)\b'

"dependencies": '([Cc]hore\(deps\)|[Ff]ix\(deps\))'

"ci": '\b([Cc]i|[Cc]ontinuous integration|[Bb]uild|[Ww]orkflow)\b'

"chore": '\b([Cc]hore|[Mm]aintenance|[Rr]efactor|[Cc]leanup)\b'

"security": '\b([Ss]ecurity|[Pp]ermissions|[Aa]uth(orization|entication)?|[Vv]ulnerabilit(y|ies)|[Cc][Vv][Ee])\b'

"os/windows": '\b([Ww]indows|[Ww]in(10|11)|[Mm]icrosoft|[Cc]md|[Pp]ower[Ss]hell)\b'

"os/linux": '\b([Ll]inux|[Uu]buntu|[Dd]ebian|[Ff]edora|[Aa]rch [Ll]inux|[Nn]ix[Oo][Ss]|systemd|XDG)\b'

"os/macos": '\b([Mm]ac[Oo][Ss]?|[Oo][Ss] ?[Xx]|[Dd]arwin|[Mm]acbook|launchd)\b'

"area/protocol": '\b([Pp]rotocol|JSON[- ]?RPC|[Rr]equest|[Rr]esponse|[Ee]vent|DecodeMessage)\b'

"area/transport": '\b([Tt]ransport|Conn|[Nn]ewline|framing|json\.Encoder|json\.Decoder)\b'

"area/server": '\b([Ss]erver|[Hh]andler|[Dd]ispatch|[Bb]roadcast)\b'

"area/pidfile": '\b(PID ?file|IsRunning|WritePID|ReadPID)\b'

"area/signals": '\b(SIGTERM|SIGINT|SIGHUP|[Ss]ignal handler)\b'

"area/socket": '\b([Ss]ocket path|XDG_RUNTIME_DIR|RuntimeDir|[Uu]nix socket)\b'

"area/docs": '\b([Dd]ocumentation|[Dd]ocs|[Rr]eadme)\b'

"area/ci": '\b([Cc]i|[Bb]uild|[Mm]akefile|[Gg]oreleaser)\b'
